# Uses pre-generated LLM perturbations (loaded from JSON) instead of regex.
# Equivalent to legacy: scripts/legacy/all_proof_llm_perturbed.py

dataset:
  type: processbench
  file_path: ./data/processed/dags.json
  num_samples: 1179
  seed: 42

perturbation:
  type: deepseek_pre
  p: 1.0              # ignored by DeepSeekPrePerturber (uses all entries)
  params:
    file: data/raw/llm_perturbations.json
    effort: medium    # one of: low, medium, high

formalization:
  type: stepfun
  sampling: deterministic

proving:
  enabled: true
  type: deepseek
  batch_size: 2
  negation: full
  base_url: http://localhost:8001/v1

output:
  dir: experiments/outputs
  save_lean_files: true
  save_intermediate: true
  save_heatmap: true

semantics:
  enabled: false

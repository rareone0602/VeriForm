# Baseline experiment matching the paper's main setup:
# regex perturbation, single formalizer (override with --set), DeepSeekProver.
# Equivalent to legacy: scripts/legacy/v2_exp.py --formalizer stepfun --p 0.5

dataset:
  type: processbench
  file_path: ./data/processed/dags.json
  num_samples: 1179
  seed: 42

perturbation:
  type: regex
  p: 0.5
  params:
    operator_swap: true
    value_change: true
    logical_negation: true

formalization:
  type: stepfun       # one of: stepfun, kimina, goedel, herald
  sampling: deterministic

proving:
  enabled: true
  type: deepseek
  batch_size: 2
  negation: full
  base_url: http://localhost:8001/v1

output:
  dir: experiments/outputs
  save_lean_files: true
  save_intermediate: true
  save_heatmap: true

semantics:
  enabled: false      # ProofBridge integration not yet implemented
